name: build
on: pull_request
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Install Rust toolchain (needed for clusterkit native extensions)
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      # Cache Rust compilation artifacts
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # Install protobuf compiler (needed for lancelot)
      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ruby
          bundler-cache: true  # Caches gems including compiled native extensions

      - name: Run specs
        run: bundle exec rake spec
